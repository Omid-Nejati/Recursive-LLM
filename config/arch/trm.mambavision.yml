name: recursive_reasoning.trm_mambavision@TinyRecursiveReasoningModelMambaVision_ACTV1

loss:
  name: losses@ACTLossHead
  loss_type: stablemax_cross_entropy

halt_exploration_prob: 0.1
halt_max_steps: 16

H_cycles: 3
L_cycles: 6
H_layers: 0
L_layers: 2

hidden_size: 512
num_heads: 8
expansion: 4

puzzle_emb_ndim: ${.hidden_size}
puzzle_emb_len: 16

pos_encodings: none
forward_dtype: float32
no_ACT_continue: True

conv_kernel_size: 3
use_local_cpe: True

mamba_blocks_per_layer: 1
attn_last_k: 1

mamba_d_state: 64
mamba_d_conv: 4
mamba_expand: 2
mamba_headdim: 64
mamba_ngroups: 1
use_mem_eff_path: False